# LiteRAG 企业知识图谱系统 - Docker Compose
# 国内镜像加速: 参考 scripts/setup.sh

services:

  lightrag:
    image: ghcr.dockerproxy.com/hkuds/lightrag:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-9621}:9621"
    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/prompts:/app/data/prompts
      - ./.env:/app/.env
      - ./config.ini:/app/config.ini
    env_file:
      - .env
    environment:
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      HOST: "0.0.0.0"
      PORT: "9621"
      LLM_TIMEOUT: "120"
      EMBEDDING_TIMEOUT: "120"
      EMBEDDING_BATCH_NUM: "5"
      EMBEDDING_FUNC_MAX_ASYNC: "4"
      MAX_PARALLEL_INSERT: "2"
      LLM_TIMEOUT: "120"
      EMBEDDING_TIMEOUT: "120"
      EMBEDDING_BATCH_NUM: "5"
      EMBEDDING_FUNC_MAX_ASYNC: "4"
      MAX_PARALLEL_INSERT: "2"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c=http.client.HTTPConnection('localhost',9621); c.request('GET','/health'); r=c.getresponse(); assert r.status==200; r.read()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - literag-net
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 10

  neo4j:
    image: docker.m.daocloud.io/library/neo4j:5-community
    volumes:
      - ./data/neo4j:/data
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_dbms_default__database: "neo4j"
    healthcheck:
      test: ["CMD-SHELL", "PORT_HEX=\"$(printf '%04X' 7687)\"; cat /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -q \":$${PORT_HEX} \""]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - literag-net
    deploy:
      restart_policy:
        condition: on-failure

  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg18
    volumes:
      - ./data/postgres:/var/lib/postgresql
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DATABASE}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - literag-net
    deploy:
      restart_policy:
        condition: on-failure

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "0.0.0.0:7463:7463"
    volumes:
      - ./.env:/app/.env
    environment:
      LIGHTRAG_HOST: "lightrag"
      LIGHTRAG_PORT: "9621"
    depends_on:
      lightrag:
        condition: service_healthy
    networks:
      - literag-net
    deploy:
      restart_policy:
        condition: on-failure

networks:
  literag-net:
    driver: bridge
